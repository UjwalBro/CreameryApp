<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Country View Creamery</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <h1>COUNTRY VIEW CREAMERY</h1>
    <img src="images/banner.jpg" alt="Banner" class="banner">
</header>

<nav>
    <button onclick="showSection('about')">About Us</button>
    <button onclick="showSection('menu')">Menu</button>
    <button onclick="showSection('order')">Order Here</button>
    <button onclick="showSection('cart')">View Cart</button>
</nav>

<!-- ABOUT -->
<section id="about" class="content">
    <h2>About Us</h2>
    <p>Welcome to Country View Creamery. We provide fresh dairy products and homemade food.</p>
</section>

<!-- MENU -->
<section id="menu" class="content">
    <h2>Menu</h2>

    <div class="item">
        <img src="images/milk.jpg">
        <p>Milk - $5</p>
    </div>

    <div class="item">
        <img src="images/icecream.jpg">
        <p>Ice Cream - $7</p>
    </div>

    <div class="item">
        <img src="images/cheese.jpg">
        <p>Cheese - $6</p>
    </div>

    <div class="item">
        <img src="images/yogurt.jpg">
        <p>Yogurt - $4</p>
    </div>

    <div class="item">
        <img src="images/sandwich.jpg">
        <p>Sandwich - $8</p>
    </div>
</section>

<!-- ORDER -->
<section id="order" class="content">
    <h2>Order Here</h2>

    <div class="order-item">
        <input type="checkbox" id="milk">
        <label>Milk ($5)</label>
        <input type="number" id="milkQty" min="1">
    </div>

    <div class="order-item">
        <input type="checkbox" id="icecream">
        <label>Ice Cream ($7)</label>
        <input type="number" id="icecreamQty" min="1">
    </div>

    <div class="order-item">
        <input type="checkbox" id="cheese">
        <label>Cheese ($6)</label>
        <input type="number" id="cheeseQty" min="1">
    </div>

    <div class="order-item">
        <input type="checkbox" id="yogurt">
        <label>Yogurt ($4)</label>
        <input type="number" id="yogurtQty" min="1">
    </div>

    <div class="order-item">
        <input type="checkbox" id="sandwich">
        <label>Sandwich ($8)</label>
        <input type="number" id="sandwichQty" min="1">
    </div>

    <br>
    <button type="button" onclick="submitOrder()">Submit Order</button>
</section>

<!-- CART -->
<section id="cart" class="content">
    <h2>Your Cart</h2>

    <ul id="cartItems"></ul>
    <h3 id="totalPrice">Total: $0</h3>

    <hr>

    <button onclick="loadOrders()">Load Previous Orders</button>

    <h3>Previous Orders</h3>
    <ul id="previousOrders"></ul>
</section>

<script>

let cart = [];

const prices = {
    milk: 5,
    icecream: 7,
    cheese: 6,
    yogurt: 4,
    sandwich: 8
};

/* NAVIGATION */
function showSection(id) {
    document.querySelectorAll(".content").forEach(s => s.style.display = "none");
    document.getElementById(id).style.display = "block";
}

/* ADD ITEM */
function addItem(id, name) {
    let checkbox = document.getElementById(id);
    let qty = parseInt(document.getElementById(id + "Qty").value);

    if (checkbox.checked && qty > 0) {
        cart.push({
            name,
            qty,
            price: prices[id] * qty
        });
    }
}

/* UPDATE CART */
function updateCart() {
    let list = document.getElementById("cartItems");
    let total = 0;

    list.innerHTML = "";

    cart.forEach(i => {
        let li = document.createElement("li");
        li.textContent = `${i.name} x${i.qty} = $${i.price}`;
        list.appendChild(li);
        total += i.price;
    });

    document.getElementById("totalPrice").textContent = "Total: $" + total;
}

/* SEND TO BACKEND */
function sendOrderToBackend(data) {
    fetch("https://creameryapp.onrender.com/orders", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
            items: data,
            total: data.reduce((s, i) => s + i.price, 0),
            time: new Date()
        })
    });
}

/* SUBMIT ORDER */
function submitOrder() {

    cart = [];

    addItem("milk", "Milk");
    addItem("icecream", "Ice Cream");
    addItem("cheese", "Cheese");
    addItem("yogurt", "Yogurt");
    addItem("sandwich", "Sandwich");

    if (cart.length === 0) {
        alert("Select items first");
        return;
    }

    updateCart();
    sendOrderToBackend(cart);

    alert("Order submitted!");
    showSection("cart");
}

/* LOAD ORDERS */
function loadOrders() {
    fetch("https://creameryapp.onrender.com/orders")
    .then(res => res.json())
    .then(data => {

        let list = document.getElementById("previousOrders");
        list.innerHTML = "";

        if (data.length === 0) {
            list.innerHTML = "<li>No orders yet</li>";
            return;
        }

        data.forEach((order, i) => {

            let items = order.items
                .map(x => `${x.name} x${x.qty}`)
                .join(", ");

            let li = document.createElement("li");
            li.textContent = `Order ${i+1}: ${items} | Total $${order.total}`;

            list.appendChild(li);
        });
    });
}

/* DEFAULT PAGE */
showSection("about");

</script>

</body>
</html>
